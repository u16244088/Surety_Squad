<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Current State Value Stream Map — Loan Application Process</text>
  <text x="600" y="58" text-anchor="middle" font-size="14" fill="#A32D2D" font-weight="600">Total Lead Time: 16.7 days  |  Process time: 6 days  |  Queue/Wait: 11.2 days (67% waste)</text>

  <!-- ═══ DATA SOURCES ROW ═══ -->
  <!-- Applicant -->
  <rect x="40" y="80" width="140" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="110" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Applicant</text>

  <!-- Credeq (green) -->
  <rect x="530" y="80" width="140" height="46" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#27500A">Credeq</text>

  <!-- Lombard (dark blue) -->
  <rect x="1020" y="80" width="140" height="46" rx="8" fill="#042C53" stroke="#042C53" stroke-width="1.5"/>
  <text x="1090" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#B5D4F4">Lombard</text>

  <!-- Flow arrows -->
  <defs>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrGr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Applicant → Credeq -->
  <line x1="180" y1="103" x2="528" y2="103" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="354" y="96" text-anchor="middle" font-size="12" fill="#085041">Application data</text>

  <!-- Lombard → Credeq -->
  <line x1="1018" y1="103" x2="672" y2="103" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="845" y="96" text-anchor="middle" font-size="12" fill="#0C447C">Payment confirmations</text>

  <!-- Credeq push down -->
  <line x1="600" y1="126" x2="600" y2="165" stroke="#888780" stroke-width="1.5" marker-end="url(#arrGr)"/>

  <!-- ═══ PROCESS STEPS ROW ═══ -->
  <!-- Step 1: Manual Capture -->
  <rect x="40" y="165" width="148" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="114" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">Manual capture</text>
  <text x="114" y="210" text-anchor="middle" font-size="11" fill="#534AB7">Admin keys data</text>
  <text x="114" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#3C3489">1 day</text>

  <!-- Queue 1: 3.2 days -->
  <polygon points="230,193 258,237 202,237" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
  <text x="230" y="254" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">3.2 days</text>
  <line x1="260" y1="213" x2="286" y2="213" stroke="#888780" stroke-width="1.5" marker-end="url(#arrGr)"/>

  <!-- Step 2: Doc Verification -->
  <rect x="286" y="165" width="148" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="360" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">Doc verification</text>
  <text x="360" y="210" text-anchor="middle" font-size="11" fill="#185FA5">ID, policy docs</text>
  <text x="360" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">1.5 days</text>

  <!-- Queue 2: 2.5 days -->
  <polygon points="476,193 504,237 448,237" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
  <text x="476" y="254" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">2.5 days</text>
  <line x1="506" y1="213" x2="532" y2="213" stroke="#888780" stroke-width="1.5" marker-end="url(#arrGr)"/>

  <!-- Step 3: Legal/Policy Review -->
  <rect x="532" y="165" width="148" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="606" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">Legal/policy review</text>
  <text x="606" y="210" text-anchor="middle" font-size="11" fill="#993C1D">Lombard checks</text>
  <text x="606" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">2 days</text>

  <!-- Queue 3: 3.5 days -->
  <polygon points="722,193 750,237 694,237" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
  <text x="722" y="254" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">3.5 days</text>
  <line x1="752" y1="213" x2="778" y2="213" stroke="#888780" stroke-width="1.5" marker-end="url(#arrGr)"/>

  <!-- Step 4: Funding Request -->
  <rect x="778" y="165" width="148" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="852" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">Funding request</text>
  <text x="852" y="210" text-anchor="middle" font-size="11" fill="#854F0B">Finance requests funds</text>
  <text x="852" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">1 day</text>

  <!-- Queue 4: 2 days (down) -->
  <polygon points="852,268 880,312 824,312" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
  <text x="852" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">2 days</text>
  <line x1="852" y1="334" x2="852" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrGr)"/>

  <!-- Disbursement -->
  <rect x="778" y="358" width="148" height="68" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="852" y="386" text-anchor="middle" font-size="13" font-weight="bold" fill="#27500A">Disbursement</text>
  <text x="852" y="406" text-anchor="middle" font-size="11" fill="#3B6D11">Funds released</text>
  <text x="852" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#27500A">0.5 day</text>

  <!-- ═══ TIMELINE ═══ -->
  <line x1="40" y1="510" x2="1160" y2="510" stroke="#B4B2A9" stroke-width="1.2"/>

  <!-- Process bars (purple/blue/coral/amber/green) -->
  <rect x="40"  y="498" width="62"  height="24" rx="4" fill="#AFA9EC"/>
  <rect x="286" y="498" width="90"  height="24" rx="4" fill="#85B7EB"/>
  <rect x="532" y="498" width="118" height="24" rx="4" fill="#F0997B"/>
  <rect x="778" y="498" width="62"  height="24" rx="4" fill="#EF9F27"/>
  <rect x="1090" y="498" width="30" height="24" rx="4" fill="#97C459"/>

  <!-- Wait bars -->
  <rect x="102"  y="498" width="184" height="24" rx="4" fill="#FAC775" opacity="0.6"/>
  <rect x="376"  y="498" width="156" height="24" rx="4" fill="#FAC775" opacity="0.6"/>
  <rect x="650"  y="498" width="128" height="24" rx="4" fill="#FAC775" opacity="0.6"/>
  <rect x="840"  y="498" width="250" height="24" rx="4" fill="#FAC775" opacity="0.6"/>

  <!-- Timeline labels -->
  <text x="71"   y="542" text-anchor="middle" font-size="11" fill="#3C3489">1d</text>
  <text x="194"  y="542" text-anchor="middle" font-size="11" fill="#633806">3.2d wait</text>
  <text x="331"  y="542" text-anchor="middle" font-size="11" fill="#0C447C">1.5d</text>
  <text x="454"  y="542" text-anchor="middle" font-size="11" fill="#633806">2.5d wait</text>
  <text x="591"  y="542" text-anchor="middle" font-size="11" fill="#712B13">2d</text>
  <text x="714"  y="542" text-anchor="middle" font-size="11" fill="#633806">3.5d wait</text>
  <text x="809"  y="542" text-anchor="middle" font-size="11" fill="#633806">1d</text>
  <text x="965"  y="542" text-anchor="middle" font-size="11" fill="#633806">2d wait</text>
  <text x="1105" y="542" text-anchor="middle" font-size="11" fill="#27500A">0.5d</text>

  <!-- Summary -->
  <text x="600" y="578" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Total: 16.7 days</text>
  <text x="600" y="600" text-anchor="middle" font-size="13" fill="#5F5E5A">Process time: 6 days   |   Queue / wait time: 11.2 days (67% waste)</text>
  <text x="600" y="620" text-anchor="middle" font-size="12" fill="#A32D2D">Biggest bottleneck: 3.5-day legal queue + 3.2-day post-capture queue</text>

  <!-- Legend -->
  <rect x="280" y="645" width="14" height="14" rx="3" fill="#AFA9EC"/><text x="300" y="656" font-size="12" fill="#5F5E5A">Process step</text>
  <rect x="420" y="645" width="14" height="14" rx="3" fill="#FAC775" opacity="0.7"/><text x="440" y="656" font-size="12" fill="#5F5E5A">Queue / wait</text>
  <polygon points="568,659 575,645 582,659" fill="#FAC775" stroke="#BA7517" stroke-width="1"/><text x="590" y="656" font-size="12" fill="#5F5E5A">Queue triangle</text>
  <rect x="720" y="645" width="14" height="14" rx="3" fill="#042C53"/><text x="740" y="656" font-size="12" fill="#5F5E5A">Lombard (funder)</text>
  <rect x="870" y="645" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/><text x="890" y="656" font-size="12" fill="#5F5E5A">Credeq (our org)</text>

</svg>
